name: iThome Daily Scraper
on:
schedule:
- cron: '0 0,12 * * *'
workflow_dispatch:

jobs:
run-scraper:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
- uses: actions/checkout@v3
- name: Setup Python
uses: actions/setup-python@v4
with:
python-version: '3.9'
- name: Install
run: pip install -r requirements.txt
- name: Execute
run: python main.py
- name: Auto Commit
run: |
git config --global user.name "Bot"
git config --global user.email "bot@example.com"
git add ithome_data.csv index.html
git commit -m "Update Stats $(date)" || exit 0
git push
